name: Security Gates

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

concurrency:
  group: security-gates-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  frontend-build-gate:
    name: Frontend build gate
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      VITE_API_BASE_URL: https://api.example.invalid/api/v1
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci --prefix frontend

      - name: Build frontend
        run: npm run build --prefix frontend

      - name: Run frontend tests
        run: npm run test --prefix frontend

  backend-dependency-audit:
    name: Backend dependency audit (pip-audit)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install pip-audit
        run: |
          python -m pip install --upgrade pip
          python -m pip install pip-audit

      - name: Run pip-audit
        run: |
          set +e
          python -m pip_audit -r backend/requirements.txt --strict --format json --output pip-audit-report.json
          status=$?
          if [ ! -s pip-audit-report.json ]; then
            echo "[]" > pip-audit-report.json
          fi
          exit $status

      - name: Upload pip-audit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pip-audit-report
          path: pip-audit-report.json

  frontend-dependency-audit:
    name: Frontend dependency audit (npm audit)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci --prefix frontend

      - name: Run npm audit (high+ only)
        run: |
          set +e
          npm audit --prefix frontend --audit-level=high --json > npm-audit-report.json
          status=$?
          if [ ! -s npm-audit-report.json ]; then
            echo "{}" > npm-audit-report.json
          fi
          exit $status

      - name: Upload npm audit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: npm-audit-report
          path: npm-audit-report.json

  python-sast-bandit:
    name: Python SAST (Bandit)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Bandit
        run: |
          python -m pip install --upgrade pip
          python -m pip install bandit[toml]

      - name: Run Bandit (high severity + high confidence)
        run: |
          set +e
          bandit -r backend/app -f json -o bandit-report.json -lll -iii
          status=$?
          if [ ! -s bandit-report.json ]; then
            echo "{}" > bandit-report.json
          fi
          exit $status

      - name: Upload Bandit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bandit-report
          path: bandit-report.json

  secret-scan-gitleaks:
    name: Secret scan (Gitleaks)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Gitleaks
        id: gitleaks
        continue-on-error: true
        run: |
          docker run --rm \
            -v "${PWD}:/repo" \
            zricethezav/gitleaks:v8.24.2 \
            detect \
            --source /repo \
            --no-git \
            --redact \
            --report-format sarif \
            --report-path /repo/gitleaks.sarif \
            --exit-code 1

      - name: Upload Gitleaks SARIF
        if: always() && hashFiles('gitleaks.sarif') != ''
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: gitleaks.sarif

      - name: Upload Gitleaks report artifact
        if: always() && hashFiles('gitleaks.sarif') != ''
        uses: actions/upload-artifact@v4
        with:
          name: gitleaks-sarif
          path: gitleaks.sarif

      - name: Enforce Gitleaks gate
        if: steps.gitleaks.outcome == 'failure'
        run: |
          echo "Gitleaks detected potential secrets."
          exit 1

  trivy-vuln-and-iac:
    name: Container and IaC scan (Trivy)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Trivy filesystem vulnerability scan
        id: trivy_vuln
        continue-on-error: true
        uses: aquasecurity/trivy-action@0.35.0
        with:
          scan-type: fs
          scan-ref: .
          vuln-type: os,library
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          format: sarif
          output: trivy-vuln.sarif
          exit-code: "1"

      - name: Trivy configuration (IaC) scan
        id: trivy_config
        continue-on-error: true
        uses: aquasecurity/trivy-action@0.35.0
        with:
          scan-type: config
          scan-ref: .
          severity: HIGH,CRITICAL
          format: sarif
          output: trivy-config.sarif
          exit-code: "1"

      - name: Upload Trivy vulnerability SARIF
        if: always() && hashFiles('trivy-vuln.sarif') != ''
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-vuln.sarif

      - name: Upload Trivy config SARIF
        if: always() && hashFiles('trivy-config.sarif') != ''
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-config.sarif

      - name: Upload Trivy reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trivy-reports
          path: |
            trivy-vuln.sarif
            trivy-config.sarif
          if-no-files-found: ignore

      - name: Enforce Trivy gate
        run: |
          if [ "${{ steps.trivy_vuln.outcome }}" = "failure" ] || [ "${{ steps.trivy_config.outcome }}" = "failure" ]; then
            echo "Trivy detected HIGH/CRITICAL findings."
            exit 1
          fi
