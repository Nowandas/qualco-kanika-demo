services:
  mongo:
    image: mongo:7.0
    container_name: kanika_demo_mongo
    restart: unless-stopped
    command: ["--bind_ip_all", "--auth"]
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USERNAME:-kanika_root}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD:?Set MONGO_ROOT_PASSWORD in .env}
      MONGO_INITDB_DATABASE: ${MONGO_DB_NAME:-kanika_demo}
      MONGO_APP_USERNAME: ${MONGO_APP_USERNAME:-kanika_app}
      MONGO_APP_PASSWORD: ${MONGO_APP_PASSWORD:?Set MONGO_APP_PASSWORD in .env}
      MONGO_APP_DATABASE: ${MONGO_DB_NAME:-kanika_demo}
    volumes:
      - mongo_data:/data/db
      - ./docker/mongo-init.js:/docker-entrypoint-initdb.d/mongo-init.js:ro
    healthcheck:
      test: ["CMD-SHELL", "mongosh --quiet --username \"$${MONGO_INITDB_ROOT_USERNAME}\" --password \"$${MONGO_INITDB_ROOT_PASSWORD}\" --authenticationDatabase admin --eval \"db.runCommand({ ping: 1 }).ok\" | grep 1 >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: prod
    container_name: kanika_demo_backend
    restart: unless-stopped
    depends_on:
      mongo:
        condition: service_healthy
    env_file:
      - .env
    environment:
      MONGO_URI: ${MONGO_URI:?Set MONGO_URI in .env}
      MONGO_DB_NAME: ${MONGO_DB_NAME:-kanika_demo}
    ports:
      - "8000:8000"
    security_opt:
      - no-new-privileges:true

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: prod
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8000/api/v1}
    container_name: kanika_demo_frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "5173:5173"
    security_opt:
      - no-new-privileges:true

volumes:
  mongo_data:
