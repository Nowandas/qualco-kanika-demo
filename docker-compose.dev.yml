services:
  mongo:
    ports:
      - "27017:27017"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: dev
    environment:
      APP_ENV: local
      MONGO_URI: ${MONGO_URI:-mongodb://kanika_app:kanika_app_dev_password@mongo:27017/kanika_demo?authSource=kanika_demo}
      MONGO_DB_NAME: ${MONGO_DB_NAME:-kanika_demo}
    volumes:
      - ./backend:/app

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: dev
    environment:
      VITE_API_BASE_URL: http://localhost:8000/api/v1
    volumes:
      - ./frontend:/app
      - /app/node_modules
